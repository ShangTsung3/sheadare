<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#108AB1"/>
      <stop offset="100%" stop-color="#0D7A9E"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06D7A0"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="90" cy="90" r="88" fill="url(#iconGrad)"/>
    <circle cx="90" cy="90" r="80" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Magnifying glass / G shape -->
    <circle cx="78" cy="78" r="40" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="108" y1="108" x2="138" y2="138" stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="78" y1="78" x2="100" y2="78" stroke="white" stroke-width="12" stroke-linecap="round"/>

    <!-- Lari accent -->
    <circle cx="138" cy="42" r="16" fill="url(#accentGrad)"/>
    <text x="138" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="15" fill="white">₾</text>

    <!-- Sparkles -->
    <circle cx="48" cy="40" r="3" fill="white" opacity="0.6"/>
    <circle cx="38" cy="54" r="2" fill="white" opacity="0.4"/>
  </g>

  <!-- GAMIGE text -->
  <text x="215" y="85" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="72" letter-spacing="8" fill="#1E293B">
    GAMIGE
  </text>

  <!-- Tagline -->
  <text x="217" y="125" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="18" letter-spacing="3" fill="#94A3B8">
    გამიგე სად არის იაფი
  </text>

  <!-- Colored underline accent -->
  <rect x="217" y="138" width="120" height="3" rx="1.5" fill="url(#iconGrad)"/>
  <rect x="345" y="138" width="40" height="3" rx="1.5" fill="url(#accentGrad)"/>
</svg>