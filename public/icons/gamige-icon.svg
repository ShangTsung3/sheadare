<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#108AB1"/>
      <stop offset="100%" stop-color="#0D7A9E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06D7A0"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#108AB1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" filter="url(#shadow)"/>

  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="2"/>

  <!-- Magnifying glass circle (forms the G shape) -->
  <circle cx="230" cy="220" r="110" fill="none" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- G opening + handle of magnifying glass -->
  <line x1="310" y1="300" x2="380" y2="370" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- G horizontal bar -->
  <line x1="230" y1="220" x2="290" y2="220" stroke="white" stroke-width="32" stroke-linecap="round"/>

  <!-- Price tag / deal indicator -->
  <circle cx="370" cy="130" r="42" fill="url(#accent)"/>
  <text x="370" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="38" fill="white">₾</text>

  <!-- Small sparkle dots for "discovery" feel -->
  <circle cx="140" cy="120" r="8" fill="white" opacity="0.6"/>
  <circle cx="115" cy="155" r="5" fill="white" opacity="0.4"/>
  <circle cx="168" cy="100" r="4" fill="white" opacity="0.3"/>
</svg>