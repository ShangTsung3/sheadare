<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ინტერნეტი არ არის — შეადარე</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #108AB1;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: bold;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 12px;
      color: #0f172a;
    }
    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #108AB1;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">S</div>
    <h1>ინტერნეტი არ არის</h1>
    <p>ინტერნეტთან კავშირი ვერ მოხერხდა. გთხოვთ შეამოწმოთ კავშირი და სცადოთ ხელახლა.</p>
    <button onclick="window.location.reload()">ხელახლა ცდა</button>
  </div>
</body>
</html>
